*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* NAVIGATION */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.92);
backdrop-filter:blur(10px);
padding:18px;
display:flex;
justify-content:center;
gap:35px;
z-index:999;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

nav a{
color:#fff;
text-decoration:none;
font-weight:bold;
font-size:16px;
transition:.3s;
}

nav a:hover{
color:#bbb;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.45),
rgba(0,0,0,.75)),
url('hero.jpg');
background-size:cover;
background-position:center center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-content{
padding:20px;
}

.hero h1{
font-size:90px;
font-weight:800;
letter-spacing:2px;
}

.hero p{
font-size:28px;
margin-top:20px;
color:#ddd;
}

.hero button{
margin-top:40px;
padding:18px 40px;
border:none;
border-radius:40px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.hero button:hover{
transform:scale(1.05);
}

/* GENERAL */

section{
padding:100px 25px;
max-width:1400px;

}

h2{

/* ABOUT */

.about{
text-align:center;
}

.about img{

height:220px;
border-radius:50%;
object-fit:cover;

box-shadow:0 0 30px rgba(255,255,255,.2);
}

.about p{
margin-top:40px;
font-size:22px;
line-height:1.8;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

/* ATHLETE CARDS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:60px;
}

.card{
background:#111;
padding:35px;
border-radius:20px;
text-align:center;
transition:.3s;
box-shadow:0 0 20px rgba(255,255,255,.05);
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:38px;
margin-bottom:10px;
}

/* GALLERY */

.category{
margin-top:80px;
}

.category h3{
text-align:center;
font-size:34px;
margin-bottom:35px;
}

.gallery{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.gallery img{
width:100%;
border-radius:18px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px rgba(255,255,255,.08);
}

.gallery img:hover{
transform:scale(1.03);
}

/* CONTACT */

.contact-box{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.contact-card{
background:#111;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
}

.contact-card a{
color:white;
text-decoration:none;
font-size:18px;
}

/* VISITORS */

.visitors{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
margin-top:70px;
}

.visitors img{
margin-top:20px;
}

/* FOOTER */

footer{
margin-top:100px;
padding:60px;
background:#111;
text-align:center;
color:#bbb;
}

/* LIGHTBOX */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
justify-content:center;
align-items:center;
z-index:9999;
animation:fade .3s;
}

.lightbox img{
max-width:95%;
max-height:95%;
border-radius:15px;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}
